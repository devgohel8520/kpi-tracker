<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign Up — KPI Tracker</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config={
  theme:{extend:{colors:{brand:{50:'#eff6ff',100:'#dbeafe',200:'#bfdbfe',300:'#93c5fd',400:'#60a5fa',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8',800:'#1e40af',900:'#1e3a8a'}}}}
}
</script>
<script src="neon-client.js"></script>
<script src="common.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',system-ui,sans-serif;}
  .form-input{width:100%;padding:10px 14px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;outline:none;transition:border 0.2s,box-shadow 0.2s;background:#fff;}
  .form-input:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,0.1);}
  .btn-primary{background:#2563eb;color:#fff;padding:12px 18px;border-radius:8px;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:background 0.2s;width:100%;}
  .btn-primary:hover{background:#1d4ed8;}
  .toast-enter{animation:slideUp 0.3s ease;}
  @keyframes slideUp{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .auth-card{padding:2rem;}
  @media (max-width:480px){
    .auth-card{padding:1.5rem;}
    .auth-card h1{font-size:1.5rem;}
    .form-input{font-size:16px;}
  }
</style>
</head>
<body class="bg-gradient-to-br from-blue-800 to-blue-900 min-h-screen flex items-center justify-center p-4">
  <div class="auth-card bg-white rounded-2xl shadow-2xl w-full max-w-md">
    <div class="text-center mb-8">
      <div class="w-14 h-14 bg-blue-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
        <svg class="w-7 h-7 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-slate-800">Create Account</h1>
      <p class="text-slate-500 text-sm mt-1">Start tracking your KPIs today</p>
    </div>
    <form id="signup-form" onsubmit="handleSignup(event)">
      <div class="mb-4">
        <label class="block text-sm font-semibold text-slate-700 mb-1.5">Full Name</label>
        <input type="text" id="name" class="form-input" placeholder="John Smith" required>
      </div>
      <div class="mb-4">
        <label class="block text-sm font-semibold text-slate-700 mb-1.5">Email</label>
        <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
      </div>
      <div class="mb-4">
        <label class="block text-sm font-semibold text-slate-700 mb-1.5">Password</label>
        <input type="password" id="password" class="form-input" placeholder="Min 6 characters" required minlength="6">
      </div>
      <div id="error" class="hidden mb-4 text-sm text-red-600 bg-red-50 rounded-lg px-4 py-3"></div>
      <button type="submit" class="btn-primary">Create Account</button>
    </form>
    <div class="mt-6 text-center text-sm text-slate-500">
      Already have an account? <a href="login.html" class="text-blue-600 font-semibold hover:underline">Sign In</a>
    </div>
    <div class="mt-4 text-center">
      <a href="index.html" class="text-sm text-slate-400 hover:text-slate-600">← Back to home</a>
    </div>
  </div>
  <div id="toast-container" class="fixed bottom-6 right-6 z-50 space-y-2 pointer-events-none"></div>
  <script>
  async function handleSignup(e) {
    e.preventDefault();
    const errorEl = document.getElementById('error');
    errorEl.classList.add('hidden');
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!name) {
      errorEl.textContent = 'Please enter your name';
      errorEl.classList.remove('hidden');
      return;
    }

    try {
      await App.signup(name, email, password);
      toast('Account created successfully!');
      setTimeout(() => { window.location.href = 'app.html'; }, 500);
    } catch (err) {
      errorEl.textContent = err.message || 'Connection error. Please try again.';
      errorEl.classList.remove('hidden');
    }
  }
  </script>
</body>
</html>
